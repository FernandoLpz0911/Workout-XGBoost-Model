name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-format:
    name: Python — Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check .

  python-lint:
    name: Python — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run linter
        run: ruff check .

  python-tests:
    name: Python — Tests (3.${{ matrix.python-minor }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-minor: ["10", "12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.${{ matrix.python-minor }}"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov httpx httpx2

      - name: Run tests with coverage
        run: pytest tests/ -v

  flutter-analyze:
    name: Flutter — Analyze & format check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install packages
        run: flutter pub get

      - name: Check Dart formatting
        run: dart format --output none --set-exit-if-changed lib/ test/

      - name: Analyze
        run: flutter analyze --fatal-infos

  flutter-test:
    name: Flutter — Tests & coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install packages
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Enforce 95 % line coverage
        run: |
          SUMMARY=$(lcov --summary coverage/lcov.info 2>&1)
          echo "$SUMMARY"
          LINES=$(echo "$SUMMARY" | grep "lines" | grep -oP '\d+\.\d+' | head -1)
          echo "Line coverage: ${LINES}%"
          python3 -c "
          import sys
          pct = float('$LINES')
          if pct < 95.0:
              print(f'Coverage {pct}% is below the 95% threshold')
              sys.exit(1)
          print(f'Coverage {pct}% passes the 95% threshold')
          "

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: app/coverage/lcov.info
          retention-days: 7
